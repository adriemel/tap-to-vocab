<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <title>Build Sentences – Tap‑to‑Vocab</title>
  <meta name="description" content="Build Spanish sentences word by word to practice grammar and vocabulary." />
  <meta property="og:title" content="Build Sentences – Tap‑to‑Vocab" />
  <meta property="og:description" content="Build Spanish sentences word by word to practice grammar and vocabulary." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tapvocab.fun/sentences.html" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:nowrap; min-width:0;">
        <div style="display:flex; align-items:center; gap:8px; min-width:0;">
          <button class="btn ghost" id="btn-manage" style="padding:6px 8px; font-size:1.3rem; flex-shrink:0;" title="Select Sentences">⚙️</button>
          <h1 style="margin:0; min-width:0;">Sentences</h1>
        </div>
        <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
          <span class="badge coin-badge" id="coin-counter"><span class="coin-icon"></span> 0</span>
          <span class="badge" id="progress-badge">0 / 0</span>
        </div>
      </div>

      <!-- Target Sentence (German) -->
      <div class="sentence-target">
        <div class="target-label">Build this sentence in Spanish:</div>
        <div class="target-sentence" id="target-sentence">—</div>
      </div>

      <!-- Build Area -->
      <div class="build-area" id="build-area">
        <span style="color: var(--muted); font-style: italic;">Tap words below to build the sentence</span>
      </div>

      <!-- Word Bank -->
      <div class="word-bank" id="word-bank"></div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn secondary" id="btn-back" disabled>← Prev</button>
        <button class="btn secondary" id="btn-reset">🔄 Reset</button>
        <button class="btn secondary" id="btn-skip">Next →</button>
        <button class="btn secondary" id="btn-home" title="Home">🏠</button>
        <button class="btn secondary" id="btn-stats" title="Stats">📊 Stats</button>
      </div>

      <div class="error" id="error" style="display:none; margin-top:12px;"></div>
    </div>
  </div>

  <!-- Sentence Manager Modal -->
  <div class="sentence-manager-modal" id="sentence-manager" style="display:none;">
    <div class="sentence-manager-content">
      <div class="sentence-manager-header">
        <h2>Filter by Category</h2>
        <button class="btn ghost" id="btn-close-manager" style="padding: 8px 12px;">✕</button>
      </div>
      
      <div style="margin-bottom: 16px;">
        <button class="btn secondary" id="btn-select-all">Select All</button>
        <button class="btn secondary" id="btn-deselect-all">Deselect All</button>
      </div>

      <div class="sentence-list" id="sentence-list"></div>

      <div class="manager-actions">
        <button class="btn" id="btn-save-selection">Save & Close</button>
      </div>
    </div>
  </div>

  <!-- Stats Modal — session counters overlay -->
  <div class="quiz-modal" id="stats-modal" style="display:none;">
    <div class="quiz-modal-content">
      <div class="quiz-modal-header">
        <h2>Session Stats</h2>
      </div>
      <div class="quiz-modal-body">
        <div class="quiz-result">
          <div class="result-item">
            <span class="result-label">Correct</span>
            <span class="result-value correct-color" id="stats-correct">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">Incorrect</span>
            <span class="result-value warn-color" id="stats-incorrect">0</span>
          </div>
          <div class="result-item">
            <span class="result-label">Accuracy</span>
            <span class="result-value" id="stats-accuracy">0%</span>
          </div>
        </div>
      </div>
      <div class="quiz-modal-actions">
        <button class="btn secondary" id="btn-stats-close">Close</button>
      </div>
    </div>
  </div>
  <script src="/assets/js/coins.js"></script>
  <script src="/assets/js/shared-utils.js"></script>
  <script src="/assets/js/stats.js"></script>
  <script src="/assets/js/sentences.js"></script>
  <script>
    SentenceBuilder.init();
  </script>
</body>
</html>
