<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Locations – Scene Layout – Tap-to-Vocab</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .scene {
      position: relative;
      width: 320px;
      height: 420px;
      margin: 16px auto;
      background: var(--card);
      border-radius: 16px;
    }

    /* Central reference box */
    #caja {
      position: absolute;
      width: 64px;
      height: 64px;
      top: 178px;
      left: 128px;
      background: var(--warn);
      border: 2px solid rgba(0,0,0,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #0b1020;
      pointer-events: none;
      user-select: none;
      z-index: 5;
    }

    /* Zone = circular blob with label below */
    .zone {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }
    .zone-dot {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.75;
      transition: transform 0.15s ease, opacity 0.15s ease;
      pointer-events: none;
    }
    .zone-label {
      font-size: 0.58rem;
      font-weight: 600;
      color: var(--ink);
      text-align: center;
      line-height: 1.2;
      pointer-events: none;
      white-space: nowrap;
    }
    .zone.zone-hover .zone-dot {
      transform: scale(1.2);
      opacity: 1;
    }

    /* lejos de — smaller, dimmer (far away cue) */
    [data-zone="lejos-de"] .zone-dot {
      width: 34px;
      height: 34px;
      opacity: 0.4;
    }

    /* cerca de — larger, more opaque (close cue) */
    [data-zone="cerca-de"] .zone-dot {
      width: 58px;
      height: 58px;
      opacity: 0.9;
    }

    /* detrás de — dimmer, slightly smaller */
    [data-zone="detras-de"] .zone-dot {
      opacity: 0.5;
      background: var(--muted);
    }

    /* delante de — brighter */
    [data-zone="delante-de"] .zone-dot {
      opacity: 0.95;
    }

    /* Zone positions — based on sketch layout */
    /* encima de — above box, top center */
    [data-zone="encima-de"]         { top: 12px;  left: 134px; }
    /* detrás de — upper right of box (behind/receding) */
    [data-zone="detras-de"]         { top: 60px;  left: 206px; }
    /* lejos de — far upper right, small */
    [data-zone="lejos-de"]          { top: 16px;  left: 262px; }
    /* a la derecha de — right of box */
    [data-zone="a-la-derecha-de"]   { top: 190px; left: 252px; }
    /* cerca de — right side, slightly below derecha */
    [data-zone="cerca-de"]          { top: 268px; left: 238px; }
    /* al lado de — between cerca and debajo, right */
    [data-zone="al-lado-de"]        { top: 330px; left: 216px; }
    /* debajo de — below box, center */
    [data-zone="debajo-de"]         { top: 354px; left: 134px; }
    /* delante de — below-left of box (in front) */
    [data-zone="delante-de"]        { top: 316px; left: 42px;  }
    /* a la izquierda de — left of box */
    [data-zone="a-la-izquierda-de"] { top: 190px; left: 14px;  }
    /* en — on/inside the box (center) */
    [data-zone="en"]                { top: 186px; left: 130px; z-index: 7; }

    /* Draggable — orange circle, clearly distinct from teal zones */
    #draggable {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--warn);
      left: 136px;
      top: 108px;
      touch-action: none;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    #result {
      text-align: center;
      margin-top: 12px;
      font-weight: 700;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Locations – Scene Layout</h1>
      <div class="scene">
        <div id="caja">la caja</div>
        <div data-zone="encima-de"         class="zone"><div class="zone-dot"></div><div class="zone-label">encima de</div></div>
        <div data-zone="debajo-de"         class="zone"><div class="zone-dot"></div><div class="zone-label">debajo de</div></div>
        <div data-zone="delante-de"        class="zone"><div class="zone-dot"></div><div class="zone-label">delante de</div></div>
        <div data-zone="detras-de"         class="zone"><div class="zone-dot"></div><div class="zone-label">detrás de</div></div>
        <div data-zone="a-la-derecha-de"   class="zone"><div class="zone-dot"></div><div class="zone-label">a la derecha de</div></div>
        <div data-zone="a-la-izquierda-de" class="zone"><div class="zone-dot"></div><div class="zone-label">a la izquierda de</div></div>
        <div data-zone="en"                class="zone"><div class="zone-dot"></div><div class="zone-label">en</div></div>
        <div data-zone="cerca-de"          class="zone"><div class="zone-dot"></div><div class="zone-label">cerca de</div></div>
        <div data-zone="al-lado-de"        class="zone"><div class="zone-dot"></div><div class="zone-label">al lado de</div></div>
        <div data-zone="lejos-de"          class="zone"><div class="zone-dot"></div><div class="zone-label">lejos de</div></div>
        <div id="draggable">🐱</div>
      </div>
      <div id="result">Drag the cat to a zone</div>
    </div>
  </div>
  <script src="/assets/js/locations.js"></script>
  <script>
    LocationsGame.init(
      document.getElementById('draggable'),
      function(zoneName, el) {
        document.getElementById('result').textContent = 'Dropped on: ' + zoneName;
        setTimeout(function() {
          LocationsGame.resetDraggable(el);
          document.getElementById('result').textContent = 'Drag the cat to a zone';
        }, 800);
      }
    );
  </script>
</body>
</html>
