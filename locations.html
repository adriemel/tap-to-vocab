<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 8 Drag Test – Tap-to-Vocab</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .scene {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 40px auto;
      background: var(--card);
      border-radius: 16px;
    }
    #draggable {
      width: 60px;
      height: 60px;
      background: var(--accent);
      border-radius: 12px;
      position: absolute;
      left: 130px;
      top: 130px;
      touch-action: none;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    [data-zone] {
      position: absolute;
      width: 80px;
      height: 60px;
      border: 2px dashed var(--muted);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--muted);
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    [data-zone].zone-hover {
      border-color: var(--accent);
      background: rgba(108,168,255,0.15);
    }
    [data-zone="above"] {
      top: 10px;
      left: 120px;
    }
    [data-zone="below"] {
      bottom: 10px;
      left: 120px;
    }
    #result {
      text-align: center;
      margin-top: 12px;
      font-weight: 700;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Phase 8 — Drag Test</h1>
      <div class="scene">
        <div data-zone="above">encima de</div>
        <div data-zone="below">debajo de</div>
        <div id="draggable"></div>
      </div>
      <div id="result">Drag the box to a zone</div>
    </div>
  </div>
  <script src="/assets/js/locations.js"></script>
  <script>
    LocationsGame.init(
      document.getElementById('draggable'),
      function(zoneName, el) {
        document.getElementById('result').textContent = 'Dropped on: ' + zoneName;
        setTimeout(function() {
          LocationsGame.resetDraggable(el);
          document.getElementById('result').textContent = 'Drag the box to a zone';
        }, 800);
      }
    );
  </script>
</body>
</html>
