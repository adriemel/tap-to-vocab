<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Locations – Scene Layout – Tap-to-Vocab</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .scene {
      position: relative;
      width: 320px;
      height: 390px;
      margin: 16px auto;
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
    }

    #caja {
      position: absolute;
      width: 70px;
      height: 70px;
      top: 160px;
      left: 125px;
      background: var(--warn);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #0b1020;
      pointer-events: none;
      user-select: none;
      z-index: 5;
    }

    .zone {
      position: absolute;
      min-width: 60px;
      min-height: 44px;
      padding: 6px 8px;
      border: 2px dashed var(--muted);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.7rem;
      color: var(--muted);
      transition: background-color 0.15s ease, border-color 0.15s ease;
      box-sizing: border-box;
    }
    .zone.zone-hover {
      border-color: var(--accent);
      background: rgba(108, 168, 255, 0.15);
    }

    [data-zone="encima-de"]         { top: 8px;    left: 110px; width: 100px; }
    [data-zone="debajo-de"]         { bottom: 8px; left: 110px; width: 100px; }

    [data-zone="a-la-derecha-de"]   { top: 173px; right: 4px;  width: 72px; font-size: 0.65rem; }
    [data-zone="a-la-izquierda-de"] { top: 173px; left: 4px;   width: 72px; font-size: 0.65rem; }

    [data-zone="delante-de"]        { top: 152px; left: 90px; width: 80px; z-index: 7; }
    [data-zone="detras-de"]         { top: 162px; left: 102px; width: 80px; z-index: 3; }

    [data-zone="en"]                { top: 172px; left: 138px; width: 44px; min-height: 44px; z-index: 9; font-size: 0.65rem; }

    [data-zone="cerca-de"]          { top: 230px; right: 4px; width: 64px; }
    [data-zone="al-lado-de"]        { top: 282px; right: 4px; width: 64px; }
    [data-zone="lejos-de"]          { top: 334px; right: 4px; width: 64px; }

    /* detrás de depth cue — LOCKED DECISION: dashed border + inset shadow */
    .zone-detras {
      border-style: dashed;
      border-color: var(--muted);
      box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.55);
      opacity: 0.7;
    }
    /* delante de — solid border, forward shadow, fully opaque */
    .zone-delante {
      border-style: solid;
      border-color: var(--ink);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
      opacity: 1.0;
    }

    /* Distance band trio — near/far without labels */
    /* cerca de — nearest: thick green border, fully opaque */
    .zone-cerca {
      border-width: 3px;
      border-color: var(--ok);
      opacity: 1.0;
    }
    /* al lado de — middle distance: default .zone styling */
    /* lejos de — farthest: thin dashed dim border */
    .zone-lejos {
      border-width: 1px;
      border-style: dashed;
      opacity: 0.5;
    }

    #draggable {
      position: absolute;
      width: 54px;
      height: 54px;
      left: 133px;
      top: 240px;
      background: var(--accent);
      border-radius: 12px;
      touch-action: none;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    #result {
      text-align: center;
      margin-top: 12px;
      font-weight: 700;
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Locations – Scene Layout</h1>
      <div class="scene">
        <div id="caja">la caja</div>
        <div data-zone="encima-de"         class="zone">encima de</div>
        <div data-zone="debajo-de"         class="zone">debajo de</div>
        <div data-zone="delante-de"        class="zone zone-delante">delante de</div>
        <div data-zone="detras-de"         class="zone zone-detras">detrás de</div>
        <div data-zone="a-la-derecha-de"   class="zone">a la derecha de</div>
        <div data-zone="a-la-izquierda-de" class="zone">a la izquierda de</div>
        <div data-zone="en"                class="zone">en</div>
        <div data-zone="cerca-de"          class="zone zone-cerca">cerca de</div>
        <div data-zone="al-lado-de"        class="zone">al lado de</div>
        <div data-zone="lejos-de"          class="zone zone-lejos">lejos de</div>
        <div id="draggable">📦</div>
      </div>
      <div id="result">Drag the box to a zone</div>
    </div>
  </div>
  <script src="/assets/js/locations.js"></script>
  <script>
    LocationsGame.init(
      document.getElementById('draggable'),
      function(zoneName, el) {
        document.getElementById('result').textContent = 'Dropped on: ' + zoneName;
        setTimeout(function() {
          LocationsGame.resetDraggable(el);
          document.getElementById('result').textContent = 'Drag the box to a zone';
        }, 800);
      }
    );
  </script>
</body>
</html>
